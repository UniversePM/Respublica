# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Nightly Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest # Just in case a .dll builds better/easier for windows

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.201'
    - name: Restore dependencies
      run: dotnet restore ./src/Respublica.csproj
    - name: Build
      run: dotnet build ./src/Respublica.csproj --no-restore
    - name: Test
      run: dotnet test ./src/Respublica.csproj --no-build --verbosity normal
